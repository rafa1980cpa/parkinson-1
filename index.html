<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroVital | Solución Integral Parkinson</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <header id="main-header" style="display: none;">
            <div class="logo">NEUROVITAL</div>
            <p>Solución Integral Digital para Parkinson</p>
            <div class="status-row">
                <span class="status-tag">Paciente: Rafael</span>
                <span class="status-tag" id="current-state-tag">Estado: ON</span>
            </div>
        </header>

        <main id="neuro-content" style="display: none;">
            <!-- Content injected via JS -->
        </main>
        
        <!-- Login Flow -->
        <main id="login-flow" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 80vh; text-align: center;">
            <h1 class="logo" style="color: var(--primary-green); font-size: 3rem; margin-bottom: 2rem;">NEUROVITAL</h1>
            <p style="font-size: 1.2rem; margin-bottom: 2rem;">Selecciona tu perfil para comenzar</p>
            <button class="btn-sos" style="width: 100%; border-radius: 20px; background: var(--primary-green); margin-bottom: 1rem; height: auto; padding: 1.5rem;" onclick="loginAs('patient')">
                <span style="font-size: 1.5rem;">Soy Paciente</span>
            </button>
            <button class="btn-sos" style="width: 100%; border-radius: 20px; background: var(--secondary-blue); height: auto; padding: 1.5rem;" onclick="loginAs('caretaker')">
                <span style="font-size: 1.5rem;">Soy Cuidador</span>
            </button>
        </main>

        <!-- Floating SOS Button -->
        <button class="btn-sos floating-sos" onclick="triggerFallSim()" title="Emergencia SOS">
            <span>SOS</span>
        </button>

        <nav class="bottom-nav">
            <button class="nav-link active" data-view="therapy" title="Terapias">
                <i data-lucide="brain-circuit"></i>
            </button>
            <button class="nav-link" data-view="ras" title="Ritmo RAS">
                <i data-lucide="music-2"></i>
            </button>
            <button class="nav-link" data-view="health" title="Salud">
                <i data-lucide="calendar-check"></i>
            </button>
            <button class="nav-link" data-view="security" title="Seguridad">
                <i data-lucide="shield-alert"></i>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
